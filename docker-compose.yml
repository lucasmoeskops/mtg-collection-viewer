services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mtg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/mtg
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
